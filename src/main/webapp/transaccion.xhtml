<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Administración de Transacciones</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

</h:head>

<h:body>

<h:form id="frmTransaccion">

    <p:growl id="mensaje" showDetail="true"/>

    <p:panel header="Registro de Transacciones Bancarias">

        <p:panelGrid columns="2">

            <h:outputLabel value="Código"/>

            <p:inputText value="#{transaccionBean.transaccion.id}"
                         readonly="true"/>

            <h:outputLabel value="Cuenta"/>

            <p:selectOneMenu value="#{transaccionBean.cuentaSeleccionada}"
                             required="true">

                <f:selectItem itemLabel="Seleccione una Cuenta"
                              itemValue="#{null}"/>

                <f:selectItems value="#{cuentaBean.listaCuentas}"
                               var="c"
                               itemValue="#{c}"
                               itemLabel="#{c.numero} - #{c.socio.persona.nombre} #{c.socio.persona.apellido}"/>

            </p:selectOneMenu>

            <h:outputLabel value="Tipo de Transacción"/>

            <p:selectOneMenu value="#{transaccionBean.tipoSeleccionado}"
                             required="true">

                <f:selectItem itemLabel="Seleccione"
                              itemValue="#{null}"/>

                <f:selectItems value="#{tipoTransaccionBean.listaTipos}"
                               var="t"
                               itemValue="#{t}"
                               itemLabel="#{t.nombre}"/>

            </p:selectOneMenu>

            <h:outputLabel value="Fecha"/>

            <p:datePicker value="#{transaccionBean.transaccion.fecha}"
                          pattern="dd/MM/yyyy HH:mm"
                          showTime="true"
                          showIcon="true"/>

            <h:outputLabel value="Valor"/>

            <p:inputNumber value="#{transaccionBean.transaccion.valor}"
                           decimalPlaces="2"
                           symbol="$ "
                           symbolPosition="p"/>

            <h:outputLabel value="Descripción"/>

            <p:inputTextarea value="#{transaccionBean.transaccion.descripcion}"
                             rows="3"
                             cols="40"/>

        </p:panelGrid>

        <br/>

        <p:commandButton value="Guardar"
                         icon="pi pi-save"
                         action="#{transaccionBean.guardar}"
                         update="frmTransaccion"/>

        <p:commandButton value="Nuevo"
                         icon="pi pi-plus"
                         action="#{transaccionBean.nuevo}"
                         process="@this"
                         update="frmTransaccion"/>

    </p:panel>

    <br/>

    <p:panel header="Listado de Transacciones">

        <p:dataTable value="#{transaccionBean.listaTransacciones}"
                     var="tr"
                     paginator="true"
                     rows="10"
                     responsiveLayout="scroll">

            <p:column headerText="Código">
                #{tr.id}
            </p:column>

            <p:column headerText="Cuenta">
                #{tr.cuenta.numero}
            </p:column>

            <p:column headerText="Socio">
                #{tr.cuenta.socio.persona.nombre}
                #{tr.cuenta.socio.persona.apellido}
            </p:column>

            <p:column headerText="Tipo">
                #{tr.tipoTransaccion.nombre}
            </p:column>

            <p:column headerText="Fecha">
                <h:outputText value="#{tr.fecha}">
                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Valor">
                <h:outputText value="#{tr.valor}">
                    <f:convertNumber type="currency"
                                     currencySymbol="$"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Descripción">
                #{tr.descripcion}
            </p:column>

            <p:column headerText="Acciones">

                <p:commandButton icon="pi pi-pencil"
                                 action="#{transaccionBean.editar(tr)}"
                                 update="frmTransaccion"/>

                <p:commandButton icon="pi pi-trash"
                                 action="#{transaccionBean.eliminar(tr)}"
                                 update="frmTransaccion">

                    <p:confirm header="Confirmación"
                               message="¿Desea eliminar la transacción?"
                               icon="pi pi-exclamation-triangle"/>

                </p:commandButton>

            </p:column>

        </p:dataTable>

    </p:panel>

    <p:confirmDialog global="true">

        <p:commandButton value="Sí"
                         type="button"
                         styleClass="ui-confirmdialog-yes"/>

        <p:commandButton value="No"
                         type="button"
                         styleClass="ui-confirmdialog-no ui-button-secondary"/>

    </p:confirmDialog>

</h:form>

</h:body>

</html>
