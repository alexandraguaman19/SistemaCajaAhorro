<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Asientos Contables</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

</h:head>

<h:body>

<h:form id="frmAsiento">

    <p:growl id="mensaje" showDetail="true"/>

    <p:panel header="Administración de Asientos Contables">

        <p:panelGrid columns="2">

            <h:outputLabel value="Código"/>

            <p:inputText value="#{asientoContableBean.asiento.id}"
                         readonly="true"/>

            <h:outputLabel value="Cuenta Contable"/>

            <p:inputText value="#{asientoContableBean.asiento.cuentaContable}"
                         required="true"
                         requiredMessage="Ingrese la cuenta contable"/>

            <h:outputLabel value="Descripción"/>

            <p:inputTextarea value="#{asientoContableBean.asiento.descripcion}"
                             rows="3"
                             cols="40"/>

            <h:outputLabel value="Fecha"/>

            <p:datePicker value="#{asientoContableBean.asiento.fecha}"
                          pattern="dd/MM/yyyy"
                          showIcon="true"/>

            <h:outputLabel value="Debe"/>

            <p:inputNumber value="#{asientoContableBean.asiento.debe}"
                           decimalPlaces="2"
                           symbol="$ "
                           symbolPosition="p"/>

            <h:outputLabel value="Haber"/>

            <p:inputNumber value="#{asientoContableBean.asiento.haber}"
                           decimalPlaces="2"
                           symbol="$ "
                           symbolPosition="p"/>

        </p:panelGrid>

        <br/>

        <p:commandButton value="Guardar"
                         icon="pi pi-save"
                         action="#{asientoContableBean.guardar}"
                         update="frmAsiento"/>

        <p:commandButton value="Nuevo"
                         icon="pi pi-plus"
                         action="#{asientoContableBean.nuevo}"
                         process="@this"
                         update="frmAsiento"/>

    </p:panel>

    <br/>

    <p:panel header="Listado de Asientos Contables">

        <p:dataTable value="#{asientoContableBean.listaAsientos}"
                     var="a"
                     paginator="true"
                     rows="10"
                     responsiveLayout="scroll"
                     emptyMessage="No existen registros">

            <p:column headerText="Código">
                #{a.id}
            </p:column>

            <p:column headerText="Fecha">
                <h:outputText value="#{a.fecha}">
                    <f:convertDateTime pattern="dd/MM/yyyy"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Cuenta Contable">
                #{a.cuentaContable}
            </p:column>

            <p:column headerText="Descripción">
                #{a.descripcion}
            </p:column>

            <p:column headerText="Debe">
                <h:outputText value="#{a.debe}">
                    <f:convertNumber type="currency"
                                     currencySymbol="$"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Haber">
                <h:outputText value="#{a.haber}">
                    <f:convertNumber type="currency"
                                     currencySymbol="$"/>
                </h:outputText>
            </p:column>

            <p:column headerText="Acciones">

                <p:commandButton icon="pi pi-pencil"
                                 title="Editar"
                                 action="#{asientoContableBean.editar(a)}"
                                 update="frmAsiento"/>

                <p:spacer width="5"/>

                <p:commandButton icon="pi pi-trash"
                                 title="Eliminar"
                                 action="#{asientoContableBean.eliminar(a)}"
                                 update="frmAsiento">

                    <p:confirm header="Confirmación"
                               message="¿Desea eliminar este asiento contable?"
                               icon="pi pi-exclamation-triangle"/>

                </p:commandButton>

            </p:column>

        </p:dataTable>

    </p:panel>

    <p:confirmDialog global="true">

        <p:commandButton value="Sí"
                         type="button"
                         styleClass="ui-confirmdialog-yes"/>

        <p:commandButton value="No"
                         type="button"
                         styleClass="ui-confirmdialog-no ui-button-secondary"/>

    </p:confirmDialog>

</h:form>

</h:body>

</html>
